<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/Style/index.css">
</head>

<body>
  <main>
    <h1>LOGIN</h1>
    <form class="form-container">
      <div>
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" name="email" id="email" placeholder="Digite seu email" required>
      </div>
      <div>
        <label class="form-label" for="senha">Senha</label>
        <input class="form-input" type="password" name="senha" id="senha" placeholder="Digite sua senha" required>
      </div>
      <button class="form-button form-button-primary" type="submit">Entrar</button>
    </form>
    <p>Não possui cadastro? <a href="index.html">Cadastre-se aqui</a></p>
  </main>
</body>

</html>
