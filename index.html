<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula Forumulários HTML</title>
  <link rel="stylesheet" href="/style/index.css">
</head>

<body>
  <main>
    <h1>Cadastro de Desenvolvedor</h1>
    <form class="form-container">
      <div class="form-group">
        <label class="form-label" for="nome">Nome Completo</label>
        <input class="form-input" id="nome" name="nome" type="text" placeholder="João Maria José" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" name="email" id="email" placeholder="seuemail@exemplo.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <input class="form-input" type="password" name="senha" id="senha" placeholder="Digite sua senha" required>
      </div>
      <div class="form-group">
        <legend>Gênero</legend>
        <select class="form-select" name="genero" id="genero">
          <option>Selecione...</option>
          <option value="m">Masculino</option>
          <option value="f">Feminino</option>
          <option value="nb">Outros</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="nasc">Data de Nascimento</label>
        <input class="form-input" type="date" name="datNasc" id="nasc">
      </div>
      <div class="form-group">
        <span class="form-label">Stacks:</span>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="html" id="html">
          <label class="form-check-label" for="html">HTML</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="css" id="css">
          <label class="form-check-label" for="css">CSS</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="javascript" id="javascript">
          <label class="form-check-label" for="javascript">JavaScript</label>
        </div>
      </div>
      <div class="form-group">
        <span class="form-label">Possui Experiência?</span>
        <div class="form-check">
          <input type="radio" class="form-check-input" name="experiencia" id="sim">
          <label class="form-check-label" for="sim">Sim</label>
        </div>
        <div class="form-check">
          <input type="radio" class="form-check-input" name="experiencia" id="não">
          <label class="form-check-label" for="não">Não</label>
        </div>
        <label class="form-label" for="descXp">Se sim, descreva:</label>
        <textarea class="form-textarea" name="descXp" id="descXp" cols="30" rows="8"></textarea>
      </div>
      <button class="form-button form-button-primary" type="submit">Cadastrar</button>
    </form>
    <p>Possui cadastro? Faça o <a href="login.html">login</a></p>
  </main>
</body>

</html>
