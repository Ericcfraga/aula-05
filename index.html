<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula Forumulários HTML</title>
  <link rel="stylesheet" href="/style/index.css">
</head>

<body>
  <main>
    <h1>Cadastro de Desenvolvedor</h1>
    <form>
      <div>
        <label class="block" for="nome">Nome Completo</label>
        <input id="nome" name="nome" type="text" placeholder="João Maria José">
      </div>
      <div>
        <label class="block" for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="seuemail@exemplo.com">
      </div>
      <div>
        <label class="block" for="senha">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
      </div>
      <div>
        <legend>Gênero</legend>
        <select name="genero" id="genero">
          <option >Selecione...</option>
          <option value="m">Masculino</option>
          <option value="f">Feminino</option>
          <option value="nb">Outros</option>
        </select>
      </div>
      <div>
        <label class="block" for="nasc">Data de Nascimento</label>
        <input type="date" name="datNasc" id="nasc">
      </div>
      <div>
        <legend>Stacks:</legend>
        <input type="checkbox" name="html" id="html">
        <label for="html">HTML</label>
        <input type="checkbox" name="css" id="css">
        <label for="css">CSS</label>
        <input type="checkbox" name="javascript" id="javascript">
        <label for="javascript">JavaScript</label>
      </div>
      <div>
        <Legend>Possui Experiência?</Legend>
        <input type="radio" name="experiencia" id="sim">
        <label for="sim">Sim</label>
        <input type="radio" name="experiencia" id="não">
        <label for="não">Não</label>
        <legend>Se sim, descreva:</legend>
        <textarea name="descXp" id="descXp" cols="30" rows="8"></textarea>
      </div>
      <button type="submit">Cadastrar</button>
    </form>
    <p>Possui cadastro? Faça o <a href="login.html">login</a></p>
  </main>
</body>

</html>
